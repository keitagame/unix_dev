<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OS-TRACE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<style>
body{
margin:0;
scroll-behavior: smooth;
}
.bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      z-index: -1;
      object-fit: cover; /* 画面いっぱいにトリミング */
    }
.k{
display:grid;
height:100vh;
}
.o{

height:100%;
  display:flex;
justify-content:center;
align-items:end;
}
.hero{
  font-family: "Plus Jakarta Sans", sans-serif;
color:white;
margin:0;
  font-size:19em;
}


  nav {
    height:fit-content;
    background: #22222200;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* 左側メニュー */
  .menu {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 20px;
  }

  nav a {
    color: white;
    text-decoration: none;
    font-size: 16px;
  }

  /* 検索バー */
  .search-box {
    margin-left: auto;
    display: flex;
    align-items: center;
    background: #fff;
    border-radius: 0px;
    padding: 8px 10px;
  }

  .search-box input {
    border: none;
    outline: none;
    font-size: 14px;
  }

  /* 採用ボタン */
  .hire-btn {
    background: teal;
    color: white;
    padding: 8px 14px;
    border-radius: 0px;
    text-decoration: none;
    margin-left: 10px;
    font-weight: bold;
  }

  /* スマホ対応 */
  @media (max-width: 600px) {
    nav {
      flex-direction: column;
      align-items: flex-start;
    }
    .search-box {
      margin-left: 0;
      width: 100%;
    }
  }
</style>
<body>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.3.23/dist/lenis.min.js"></script>

<!-- 初期化コード -->
<script>
  const lenis = new Lenis({
    duration: 1.5, // スクロールのアニメーション時間（秒単位。数値を大きくするとよりゆっくりに）
    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), // 動きの加速・減速の計算式
    wheelMultiplier: 0.8, // スクロールの速度（1より小さくすると遅くなる）
  })

  function raf(time) {
    lenis.raf(time)
    requestAnimationFrame(raf)
  }

  requestAnimationFrame(raf)
</script>

<video class="bg-video" autoplay muted loop playsinline>
    <source src="tokyo.mp4" type="video/mp4">
    <!-- 対応していないブラウザ向け -->
    Your browser does not support the video tag.
  </video>
<div class="k">
  <nav>
  <ul class="menu">
    <li><a href="#">ホーム</a></li>
    <li><a href="#">サービス</a></li>
    <li><a href="#">料金</a></li>
    <li><a href="#">お問い合わせ</a></li>
  </ul>

  <div class="search-box">
    <input type="text" placeholder="検索…">
  </div>

  <a href="#" class="hire-btn">お問い合わせ</a>
</nav>
  <div class="o">
<h1 class="hero">MONIX</h1>
</div>
</div>
</body>
</html>
